services:

  kanban_dbgate:
    container_name: kanban_dbgate
    image: dbgate/dbgate:5.5.6-alpine
    restart: always
    ports:
      # Используем 8088 порт, так как 8087 занят бэкендом Symfony
      - 8088:3000
    # Монтируем volume базы, чтобы dbgate мог работать с данными при необходимости
    volumes:
      - ./../postgres_data_kanban:/data/postgres
    environment:
      CONNECTIONS: con1,con2,con3,con4

      LABEL_con1: Kanban Postgres
      # Имя контейнера базы в нашей докер-сети kanban-net
      SERVER_con1: kanban_postgres
      USER_con1: ${DB_USER:-root}
      PASSWORD_con1: ${DB_PASSWORD:-password}
      # Внутри докер-сети база слушает стандартный порт 5432
      PORT_con1: 5432
      ENGINE_con1: postgres@dbgate-plugin-postgres
    networks:
      - kanban-net

networks:
  kanban-net:
    # Указываем, что сеть создана другим docker-compose (основным)
    external: true
    name: kanban-net
